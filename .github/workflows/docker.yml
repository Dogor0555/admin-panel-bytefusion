name: Build & Push Admin Panel

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Admin Panel Image
        run: |
          docker build -t ghcr.io/Fort503/admin-panel:latest .
          docker push ghcr.io/Fort503/admin-panel:latest
